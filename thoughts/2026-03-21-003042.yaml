content: "最近一直在思考一件事情，我到底应该不应该特别负责，AI
  的使用虽然让我们都更加容易的达到自己的目的，例如写代码，只要有想法，就能很快的实现一个原型。但是真正能让一个项目成为项目，质量是脱不了干系的。而大多数人在\
  原型创建以及后续迭代过程中压根儿就不关注质量，一味的相信 AI 能够给出的答案是稳定的、可靠的…… 在我看来是非常不负责任的行为……
  换言讲，我的负责可能会给我带来更多的负担，因为我要为其他人的不负责任擦屁股:sticker[getimgdata-2.gif]:"
