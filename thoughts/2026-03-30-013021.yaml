content: |-
  AI 如何辅助人类来做设计呢？审美是一个很主观的事情，一千个读者有一千个哈姆雷特。\
  想要设计出的内容具有设计感，AI 设计与人类审美闭环，那审美本身就必须是可量化的。

  我想这也大概就是目前我自己用 AI 做 UI/ UX 时遇到的痛点 :sticker[getimgdata-14.jpg]:

  这个环节还是得我自己亲自去审核、去感知 AI 给出的产物。\
  实现 `我提出需求 --> AI Design --> 我肉眼人脑审计 --> 改进需求` 这样一个闭环。
