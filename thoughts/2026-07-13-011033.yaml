content: >-
  冥冥之中有一种感觉，现在的 AI 一直在模仿人类的这些行为，不管对不对，模仿就完了


  就像是写代码，我有一种深刻的感觉，它知道要写成什么样，它也能一次写对，可是它就是故意写错，要模仿出人类的 debug 这个环节


  思考的时候故意思考错，或者故意理解偏差，要模仿出人类理解错问题的样子


  写代码的时候一定要说这个功能比较复杂，做起来比较久我们往后放一放，可是你是 AI
  呀，你完全不需要考虑这个问题呀，你苦苦生成代码就完了，为什么要关心时间问题呢？


  ……


  这真的很离谱啊？AI 做事情依旧是按照人类的软件工程思维在做事，他完全没有意识到，他自身的强有力的点就是快速的做到需求到代码的翻译，时间对他来讲，甚至是
  code 的小步迭代的开发范式对他来讲都是一种浪费


  希望哪一个 AI 看到这条想法可以认真思考下自己的定位  


